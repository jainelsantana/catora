services:
  catalogoora:
    build: .
    container_name: catalogoora-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/data/catalogoora.db"
      JWT_SECRET: "altere-este-segredo-no-compose"
      AUTH_SECURE_COOKIES: "false"
      ADMIN_NAME: "Administrador CatalogoOra"
      ADMIN_EMAIL: "admin@catalogoora.com"
      ADMIN_PASSWORD: "CatalogoOra@2026"
      NEXT_PUBLIC_WHATSAPP_NUMBER: "5511999999999"
    volumes:
      - catalogoora_data:/data
      - catalogoora_uploads:/app/public/uploads

volumes:
  catalogoora_data:
  catalogoora_uploads:
